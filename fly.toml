# Fly.io config สำหรับบอทหลัก — ย้ายจาก Railway เพราะ Railway บล็อก UDP (Discord voice)
# build จาก apps/bot/Dockerfile (มี ffmpeg + yt-dlp) — context = repo root
app = "hino-discord-bot"
primary_region = "sin"

[build]
  dockerfile = "apps/bot/Dockerfile"

[env]
  NODE_ENV = "production"
  BOT_INTERNAL_PORT = "3001"
  # URL สาธารณะ ไม่ใช่ secret — เก็บใน config ที่ track ใน git เพื่อไม่ให้หลุดตอน migrate host
  DASHBOARD_URL = "https://dashboard-production-2783b.up.railway.app"

# internal API (Fastify :3001) — dashboard บน Railway เรียกผ่าน public URL + Bearer auth
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # ต้อง always-on — Discord gateway ต้องต่อตลอด
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # ffmpeg/yt-dlp ตอนเล่นเพลงกินแรมนิดหน่อย
